<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Elomda Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; }
        .order-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.1); transition: all 0.3s; }
        .order-card:hover { border-color: #D4AF37; background: rgba(212,175,55,0.02); }
    </style>
</head>

<body class="p-8">
    <div class="container mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/10 pb-8">
            <div>
                <h1 class="text-4xl font-black mb-2">لوحة التحكم <span class="text-[#D4AF37]">Premium</span></h1>
                <p class="text-gray-500 text-sm italic">مراقبة الطلبات في الوقت الفعلي</p>
            </div>
            <div class="flex gap-4">
                <button onclick="clearAllOrders()" class="text-red-500 border border-red-500/30 px-4 py-2 rounded text-xs hover:bg-red-500 hover:text-white transition-all">مسح كل الطلبات</button>
                <a href="index.html" class="bg-white text-black px-6 py-2 rounded-full font-bold text-xs">العودة للمتجر</a>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Stats -->
            <div class="lg:col-span-1 space-y-6">
                <div class="order-card p-8 rounded-3xl">
                    <span class="text-[10px] text-[#D4AF37] font-black uppercase tracking-widest block mb-2">Total Orders</span>
                    <h2 id="total-count" class="text-6xl font-black">0</h2>
                </div>
                <div class="order-card p-8 rounded-3xl">
                    <span class="text-[10px] text-green-500 font-black uppercase tracking-widest block mb-2">Recent (24h)</span>
                    <h2 id="recent-count" class="text-6xl font-black">0</h2>
                </div>
            </div>

            <!-- Orders Feed -->
            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">آخر الطلبات المستلمة</h3>
                    <span class="bg-[#D4AF37] text-black text-[10px] font-black px-3 py-1 rounded-full animate-pulse">LIVE UPDATE</span>
                </div>
                <div id="orders-list" class="space-y-4">
                    <!-- Orders will appear here -->
                    <div class="text-center py-20 text-gray-600 italic">جاري تحميل الطلبات...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Sound -->
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // Same Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDummyKey_PleaseReplace",
            authDomain: "fashion-store-dummy.firebaseapp.com",
            projectId: "fashion-store-dummy",
            storageBucket: "fashion-store-dummy.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        if (firebaseConfig.apiKey !== "AIzaSyDummyKey_PleaseReplace") {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore ? firebase.firestore() : null;

        function renderOrders() {
            // Load from LocalStorage (Sync mode)
            const orders = JSON.parse(localStorage.getItem('alomda_orders') || '[]').reverse();
            const list = document.getElementById('orders-list');
            const total = document.getElementById('total-count');
            
            total.innerText = orders.length;
            document.getElementById('recent-count').innerText = orders.filter(o => (new Date().getTime() - o.timestamp) < 86400000).length;

            if(orders.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-gray-600 italic">لا توجد طلبات بعد.</div>`;
                return;
            }

            list.innerHTML = orders.map((order, index) => `
                <div class="order-card p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 animate-[fadeIn_0.5s_ease-out]">
                    <div class="flex gap-4 items-center">
                        <div class="w-12 h-12 bg-[#D4AF37]/10 rounded-full flex items-center justify-center text-[#D4AF37]">
                            ${index + 1}
                        </div>
                        <div>
                            <h4 class="font-black text-lg">${order.productName}</h4>
                            <p class="text-xs text-[#D4AF37] font-bold">${order.customerName} - ${order.phone}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-500 mb-1">${new Date(order.timestamp).toLocaleString('ar-EG')}</p>
                        <p class="text-[10px] font-bold bg-white/5 px-2 py-1 rounded border border-white/10 max-w-[200px] truncate">${order.address}</p>
                    </div>
                </div>
            `).join('');
        }

        // Real-time listener for Firebase (if keys exist)
        if (db) {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const firebaseOrders = [];
                snapshot.forEach(doc => firebaseOrders.push(doc.data()));
                
                // Play sound if new order
                if (snapshot.docChanges().some(c => c.type === "added")) {
                    document.getElementById('notif-sound').play().catch(() => {});
                }
                
                // For demo, we still use local but firebase would replace it here
                renderOrders(); 
            });
        }

        function clearAllOrders() {
            if(confirm("هل أنت متأكد من مسح جميع الطلبات؟")) {
                localStorage.removeItem('alomda_orders');
                renderOrders();
            }
        }

        // Initial render
        renderOrders();
        
        // Check for updates every 2 seconds (for LocalStorage sync across tabs)
        setInterval(renderOrders, 2000);
    </script>
</body>
</html>
